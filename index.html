<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Plan Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; box-sizing: border-box; font-family: system-ui; }
    body { background: #0f172a; color: #fff; padding: 2rem; max-width: 600px; margin: auto; }
    h1 { margin-bottom: 1.5rem; }
    input, button { padding:.7rem; border-radius: 6px; border: none; margin:.3rem 0; width: 100%; }
    input { background: #1e293b; color: #fff; }
    button { background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
    .row { display: flex; gap:.5rem; }
    .row input { flex: 1; }
    .row button { width: auto; }
    ul { list-style: none; margin-top: 1rem; }
    li { background: #1e293b; padding:.8rem; margin:.5rem 0; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
    .done { text-decoration: line-through; opacity:.6; }
    .delete { background: #ef4444; color: #fff; padding:.3rem.6rem; width:auto; }
    .logout { background: #64748b; margin-top: 2rem; }
    #app { display: none; }
  </style>
</head>
<body>
  <div id="auth">
    <h1>Study Plan Tracker</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <div class="row">
      <button onclick="signUp()">Sign Up</button>
      <button onclick="signIn()">Login</button>
    </div>
  </div>

  <div id="app">
    <h1>My Study Plan</h1>
    <div class="row">
      <input id="taskInput" placeholder="Add subject or task...">
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

<script>
  const SUPABASE_URL = 'https://njiglkkopjcsfhpiydge.supabase.co/rest/v1/'; 
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5qaWdsa2tvcGpjc2ZocGl5ZGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTAwODUsImV4cCI6MjA5MjM2NjA4NX0.feciJuSe42N4cnKKil1613avhOaLBjEAl8ChOAv4zQM';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await supabaseClient.auth.signUp({ email, password });
    if (error) alert(error.message);
    else alert('Check your email to confirm, then login');
  }

  async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
  }

  async function logout() {
    await supabase.auth.signOut();
  }

  async function addTask() {
    const input = document.getElementById('taskInput');
    if (!input.value.trim()) return;
    const user = (await supabase.auth.getUser()).data.user;
    await supabase.from('study_plans').insert({ task: input.value, user_id: user.id });
    input.value = '';
    loadTasks();
  }

  async function loadTasks() {
    const { data } = await supabase.from('study_plans').select('*').order('created_at');
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    data.forEach(t => {
      list.innerHTML += `<li class="${t.done ? 'done' : ''}">
        <span onclick="toggleTask(${t.id}, ${!t.done})">${t.task}</span>
        <button class="delete" onclick="deleteTask(${t.id})">X</button>
      </li>`;
    });
  }

  async function toggleTask(id, done) {
    await supabase.from('study_plans').update({ done }).eq('id', id);
    loadTasks();
  }

  async function deleteTask(id) {
    await supabase.from('study_plans').delete().eq('id', id);
    loadTasks();
  }

  supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadTasks();
    } else {
      document.getElementById('auth').style.display = 'block';
      document.getElementById('app').style.display = 'none';
    }
  });
</script>
</body>
</html>
